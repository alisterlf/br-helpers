name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish npm (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - name: Choose npm dist-tag
        id: dist-tag
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "value=next" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --provenance --tag ${{ steps.dist-tag.outputs.value }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
