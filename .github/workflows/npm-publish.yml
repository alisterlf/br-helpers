name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish npm (Node 24)
    runs-on: ubuntu-latest
    environment:
      name: prd
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node -e "const pkg = require('./package.json'); const expected = `v${pkg.version}`; const actual = process.env.RELEASE_TAG; if (actual !== expected) { console.error(`Release tag ${actual} does not match package version ${expected}.`); process.exit(1); }"
      - name: Choose npm dist-tag
        id: dist-tag
        run: |
          if [ "${{ github.event_name }}" = "release" ] && [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "value=next" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - run: npm publish --provenance --access public --tag ${{ steps.dist-tag.outputs.value }}
